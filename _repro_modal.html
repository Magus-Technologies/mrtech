<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <title>repro</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="assets/css/app.css" rel="stylesheet"/>
</head>
<body class="tr-body">
<div id="sidebar-overlay"></div>
<div class="tr-sidebar" id="sidebar"><nav class="tr-nav"></nav></div>
<div class="tr-main" id="main-content">
  <div class="tr-topbar"></div>
  <div class="tr-content">
    <h5>contenido</h5>

    <!-- ══════ MODAL CERRAR CAJA ══════ -->
    <div class="modal show" id="modal-cerrar-caja" tabindex="-1" style="display:block">
      <div class="modal-dialog modal-lg modal-dialog-scrollable modal-fullscreen-sm-down">
        <div class="modal-content">
          <div class="modal-header" style="background:#1a1a2e;color:#fff">
            <h6 class="modal-title fw-bold">🔒 Cierre de caja — 18/06/2026</h6>
            <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
          </div>
          <form method="POST">
            <div class="modal-body">
              <div class="row g-2 mb-4">
                <div class="col-4"><div class="p-2 bg-light rounded text-center"><div class="small text-muted">Saldo inicial</div><div class="fw-bold text-success">S/ 0.00</div></div></div>
                <div class="col-4"><div class="p-2 bg-light rounded text-center"><div class="small text-muted">Ingresos</div><div class="fw-bold text-primary">S/ 500.00</div></div></div>
                <div class="col-4"><div class="p-2 bg-light rounded text-center"><div class="small text-muted">Egresos</div><div class="fw-bold text-danger">S/ 80.00</div></div></div>
              </div>
              <div class="mb-4">
                <table class="table table-sm table-bordered mb-0 small">
                  <thead class="table-light"><tr><th>Método</th><th>Ing</th><th>Egr</th><th>Neto</th></tr></thead>
                  <tbody>
                    <tr><td>💵 Efectivo</td><td>200</td><td>80</td><td>120</td></tr>
                    <tr><td>💜 Yape</td><td>300</td><td>0</td><td>300</td></tr>
                  </tbody>
                </table>
              </div>
              <p class="text-muted small mb-3"><strong>Cuenta el efectivo físico</strong> e ingresa cada denominación:</p>
              <div class="row g-2">
                <div class="col-12"><div class="tr-section-title mb-1">💵 Billetes</div></div>
                <div class="col-6 col-md-4"><label class="small">S/ 200</label><input type="number" class="form-control form-control-sm" value="0"></div>
                <div class="col-6 col-md-4"><label class="small">S/ 100</label><input type="number" class="form-control form-control-sm" value="0"></div>
                <div class="col-6 col-md-4"><label class="small">S/ 50</label><input type="number" class="form-control form-control-sm" value="0"></div>
                <div class="col-6 col-md-4"><label class="small">S/ 20</label><input type="number" class="form-control form-control-sm" value="0"></div>
                <div class="col-6 col-md-4"><label class="small">S/ 10</label><input type="number" class="form-control form-control-sm" value="0"></div>
                <div class="col-12 mt-2"><div class="tr-section-title mb-1">🪙 Monedas</div></div>
                <div class="col-6 col-md-4"><label class="small">S/ 5.00</label><input type="number" class="form-control form-control-sm" value="0"></div>
                <div class="col-6 col-md-4"><label class="small">S/ 2.00</label><input type="number" class="form-control form-control-sm" value="0"></div>
                <div class="col-6 col-md-4"><label class="small">S/ 1.00</label><input type="number" class="form-control form-control-sm" value="0"></div>
                <div class="col-6 col-md-4"><label class="small">S/ 0.50</label><input type="number" class="form-control form-control-sm" value="0"></div>
                <div class="col-6 col-md-4"><label class="small">S/ 0.20</label><input type="number" class="form-control form-control-sm" value="0"></div>
                <div class="col-6 col-md-4"><label class="small">S/ 0.10</label><input type="number" class="form-control form-control-sm" value="0"></div>
              </div>
              <div class="row g-2 mt-4">
                <div class="col-md-4"><div class="p-3 rounded text-center" style="background:#f0fdf4"><div class="small">Efectivo esperado</div><div class="fw-bold fs-5">S/ 120.00</div></div></div>
                <div class="col-md-4"><div class="p-3 rounded text-center" style="background:#eef2ff"><div class="small">Contado</div><div class="fw-bold fs-5">S/ 0.00</div></div></div>
                <div class="col-md-4"><div class="p-3 rounded text-center"><div class="small">Diferencia</div><div class="fw-bold fs-5">S/ 0.00</div></div></div>
              </div>
            </div>
            <div class="modal-footer">
              <button type="button" class="btn btn-secondary">Cancelar</button>
              <button type="submit" class="btn btn-warning fw-bold">🔒 Confirmar cierre de caja</button>
            </div>
          </form>
        </div>
      </div>
    </div>

  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
  const m = new bootstrap.Modal(document.getElementById('modal-cerrar-caja'));
  m.show();
</script>
</body>
</html>
